name: WarmWindow

on:
  schedule:
    # Times are UTC. Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC.
    # The ~1h buffer over the 5h window absorbs cron jitter, so every ping
    # reliably lands in a fresh window. 6 divides 24 evenly -> no drift.
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

concurrency:
  group: warmwindow
  cancel-in-progress: false

jobs:
  warmup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Send warmup ping
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: claude -p "hello world!" --model haiku --no-session-persistence
